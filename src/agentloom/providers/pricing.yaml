# Reasoning models: o-series (OpenAI), Claude with extended thinking, and
# Gemini 2.5+ thinking all bill chain-of-thought tokens at the OUTPUT rate.
# ``calculate_cost`` adds ``reasoning_tokens`` to ``completion_tokens``
# before applying ``output_cost_per_1k`` — no separate "reasoning" rate is
# needed in this table.

