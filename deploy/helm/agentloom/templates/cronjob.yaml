{{- if .Values.schedule.enabled -}}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "agentloom.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agentloom.labels" . | nindent 4 }}
spec:
  schedule: {{ .Values.schedule.cron | quote }}
  {{- with .Values.schedule.timeZone }}
  timeZone: {{ . | quote }}
  {{- end }}
  concurrencyPolicy: {{ .Values.schedule.concurrencyPolicy }}
  {{- with .Values.schedule.startingDeadlineSeconds }}
  startingDeadlineSeconds: {{ . }}
  {{- end }}
  successfulJobsHistoryLimit: {{ .Values.schedule.successfulJobsHistoryLimit }}
  failedJobsHistoryLimit: {{ .Values.schedule.failedJobsHistoryLimit }}
  jobTemplate:
    metadata:
      labels:
        {{- include "agentloom.labels" . | nindent 8 }}
    spec:
      backoffLimit: {{ .Values.job.backoffLimit }}
      ttlSecondsAfterFinished: {{ .Values.job.ttlSecondsAfterFinished }}
      {{- with .Values.job.activeDeadlineSeconds }}
      activeDeadlineSeconds: {{ . }}
      {{- end }}
      template:
        metadata:
          labels:
            {{- include "agentloom.selectorLabels" . | nindent 12 }}
            {{- with .Values.podLabels }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.podAnnotations }}
          annotations:
            {{- toYaml . | nindent 12 }}
          {{- end }}
        spec:
          {{- include "agentloom.podSpec" . | nindent 10 }}
{{- end }}
