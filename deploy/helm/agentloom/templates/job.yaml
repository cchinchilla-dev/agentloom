{{- if not .Values.schedule.enabled -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "agentloom.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agentloom.labels" . | nindent 4 }}
spec:
  backoffLimit: {{ .Values.job.backoffLimit }}
  ttlSecondsAfterFinished: {{ .Values.job.ttlSecondsAfterFinished }}
  {{- with .Values.job.activeDeadlineSeconds }}
  activeDeadlineSeconds: {{ . }}
  {{- end }}
  template:
    metadata:
      labels:
        {{- include "agentloom.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- include "agentloom.podSpec" . | nindent 6 }}
{{- end }}
