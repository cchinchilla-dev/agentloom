{{- if not .Values.provider.existingSecret -}}
{{- if or .Values.provider.openaiApiKey .Values.provider.anthropicApiKey .Values.provider.googleApiKey -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "agentloom.fullname" . }}-provider-keys
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agentloom.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Values.provider.openaiApiKey }}
  OPENAI_API_KEY: {{ .Values.provider.openaiApiKey | quote }}
  {{- end }}
  {{- if .Values.provider.anthropicApiKey }}
  ANTHROPIC_API_KEY: {{ .Values.provider.anthropicApiKey | quote }}
  {{- end }}
  {{- if .Values.provider.googleApiKey }}
  GOOGLE_API_KEY: {{ .Values.provider.googleApiKey | quote }}
  {{- end }}
{{- end }}
{{- end }}
