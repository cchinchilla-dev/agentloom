apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: agentloom-egress
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: agentloom
  policyTypes:
    - Egress
    - Ingress
  ingress: []
  egress:
    # DNS resolution (restricted to kube-system)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # HTTPS to LLM API endpoints (external)
    - to: []
      ports:
        - protocol: TCP
          port: 443
    # OTel collector (gRPC) within cluster
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 4317
    # No Ollama in production — only cloud LLM providers
