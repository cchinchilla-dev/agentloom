apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: agentloom

resources:
  - ../../base

patches:
  - path: patch-resources.yaml
    target:
      kind: Job
      name: agentloom-workflow
  - path: patch-resources-cronjob.yaml
    target:
      kind: CronJob
      name: agentloom-scheduled
  # Disable NetworkPolicy in dev for fast iteration
  - patch: |
      $patch: delete
      apiVersion: networking.k8s.io/v1
      kind: NetworkPolicy
      metadata:
        name: agentloom-egress
    target:
      kind: NetworkPolicy
      name: agentloom-egress
