apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: agentloom

resources:
  - ../../base

images:
  - name: ghcr.io/cchinchilla-dev/agentloom
    newTag: main-abc1234  # Replace with CI SHA tag

patches:
  - path: patch-resources.yaml
    target:
      kind: Job
      name: agentloom-workflow
  - path: patch-resources-cronjob.yaml
    target:
      kind: CronJob
      name: agentloom-scheduled
