apiVersion: v1
kind: Secret
metadata:
  name: agentloom-provider-keys
  namespace: agentloom
  labels:
    app.kubernetes.io/name: agentloom
    app.kubernetes.io/component: config
type: Opaque
# IMPORTANT: Do not store real API keys in this file.
# Populate the secret before deploying:
#
#   kubectl create secret generic agentloom-provider-keys \
#     --from-literal=OPENAI_API_KEY=<your-key> \
#     --from-literal=ANTHROPIC_API_KEY=<your-key> \
#     --from-literal=GOOGLE_API_KEY=<your-key> \
#     -n agentloom --dry-run=client -o yaml | kubectl apply -f -
#
# Or use an external secret management tool (External Secrets Operator,
# Sealed Secrets, SOPS) for production environments.
data: {}
