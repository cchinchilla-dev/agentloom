apiVersion: batch/v1
kind: Job
metadata:
  name: agentloom-workflow
  namespace: agentloom
  labels:
    app.kubernetes.io/name: agentloom
    app.kubernetes.io/component: runner
spec:
  backoffLimit: 2
  ttlSecondsAfterFinished: 3600
  activeDeadlineSeconds: 600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agentloom
        app.kubernetes.io/component: runner
    spec:
      restartPolicy: Never
      serviceAccountName: agentloom
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: agentloom
          image: ghcr.io/cchinchilla-dev/agentloom:latest
          imagePullPolicy: IfNotPresent
          args: ["run", "/workflows/workflow.yaml"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          envFrom:
            - secretRef:
                name: agentloom-provider-keys
          env:
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector:4317"
          resources:
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 256Mi
          volumeMounts:
            - name: workflows
              mountPath: /workflows
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: workflows
          configMap:
            name: agentloom-workflows
        - name: tmp
          emptyDir: {}
