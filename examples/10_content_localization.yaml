name: content-localization
version: "1.0"
description: >
  Multi-market content localization pipeline. Fetches source content from CMS,
  runs 3 parallel localization subworkflows (ES, DE, JA) — each with translation,
  cultural adaptation, legal compliance, and formatting — then aggregates results
  and generates a deployment manifest.

config:
  provider: openai
  model: gpt-4.1-nano
  budget_usd: 0.15
  max_concurrent_steps: 3

state:
  source_content: >
    Product: DataFlow Pro — Enterprise ETL Platform

    Headline: "Move your data at the speed of business"

    Description: DataFlow Pro connects to 200+ data sources and delivers
    real-time analytics with 99.99% reliability. Trusted by Fortune 500
    companies including Bank of America, Johnson & Johnson, and Walmart.
    Start your free 30-day trial — no credit card required. Plans start
    at $499/month per team.

    CTA: "Start Free Trial"

    Legal: Offer valid in participating regions. Enterprise pricing available.
    SOC 2 Type II certified. GDPR and CCPA compliant. Data processed in your
    region of choice.

    Testimonial: "DataFlow Pro cut our data pipeline costs by 60% and reduced
    latency from hours to seconds." — Sarah Kim, VP Engineering, TechCorp
  localize_es: ""
  localize_de: ""
  localize_ja: ""
  quality_report: ""
  deployment_manifest: ""

steps:
  # --- Layer 0: fetch latest content version from CMS ---

  - id: fetch_content
    type: tool
    tool_name: http_request
    tool_args:
      url: "https://jsonplaceholder.typicode.com/posts/1"
      method: "GET"
    output: cms_metadata

  # --- Layer 1: 3 parallel localization subworkflows ---

  - id: localize_es
    type: subworkflow
    depends_on: [fetch_content]
    workflow_inline:
      name: localize-spanish
      config:
        provider: openai
        model: gpt-4.1-nano
      state:
        translation: ""
        adaptation: ""
        legal_review: ""
        final_content: ""
      steps:
        - id: translate
          type: llm_call
          system_prompt: >
            You are a professional EN→ES translator specializing in B2B SaaS
            marketing. Translate accurately while maintaining persuasive tone.
            Keep brand names, product names, and technical terms untranslated.
            Use Latin American neutral Spanish (not Spain-specific).
          prompt: |
            Translate this marketing content to Spanish (Latin American):

            {state.source_content}
          output: translation

        - id: cultural_adapt
          type: llm_call
          depends_on: [translate]
          system_prompt: >
            You are a LATAM market localization specialist. Review the translation
            and adapt for Latin American B2B audiences:
            - Replace US-centric references with regional equivalents
            - Adjust testimonials to feel authentic (Latin American company names)
            - Ensure pricing format matches local conventions (USD is fine for LATAM SaaS)
            - Adapt idioms and colloquialisms
            Return the fully adapted version.
          prompt: |
            Culturally adapt this translation for the LATAM market:

            Translation: {state.translation}
            Original: {state.source_content}
          output: adaptation

        - id: legal_check
          type: llm_call
          depends_on: [cultural_adapt]
          system_prompt: >
            You are a LATAM regulatory compliance specialist. Review marketing
            content for compliance with:
            - Mexico's LFPDPPP (data protection law)
            - Brazil's LGPD
            - Argentina's PDPA
            - Regional consumer protection laws (trial/pricing claims)
            Flag any issues and suggest required disclaimers.
            Respond with COMPLIANT: true/false and required changes.
          prompt: |
            Review for LATAM legal compliance:

            {state.adaptation}
          output: legal_review

        - id: format_output
          type: llm_call
          depends_on: [legal_check]
          system_prompt: >
            Generate the final localized content package in structured format:
            LOCALE: es-419
            HEADLINE: ...
            DESCRIPTION: ...
            CTA: ...
            LEGAL: ... (include required disclaimers)
            TESTIMONIAL: ...
            COMPLIANCE_NOTES: ...
          prompt: |
            Generate final Spanish content package:

            Adapted content: {state.adaptation}
            Legal review: {state.legal_review}
          output: final_content
    output: localize_es

  - id: localize_de
    type: subworkflow
    depends_on: [fetch_content]
    workflow_inline:
      name: localize-german
      config:
        provider: openai
        model: gpt-4.1-nano
      state:
        translation: ""
        adaptation: ""
        legal_review: ""
        final_content: ""
      steps:
        - id: translate
          type: llm_call
          system_prompt: >
            You are a professional EN→DE translator specializing in B2B enterprise
            software. Use formal German (Sie-form). Maintain technical precision.
            German B2B prefers factual over hyperbolic — tone down superlatives.
            Keep brand names and product names untranslated.
          prompt: |
            Translate this marketing content to German:

            {state.source_content}
          output: translation

        - id: cultural_adapt
          type: llm_call
          depends_on: [translate]
          system_prompt: >
            You are a DACH market localization specialist. Adapt for German-speaking
            B2B audiences:
            - Replace US company references with European equivalents (DAX companies)
            - Convert pricing to EUR (use approximate 1:1 conversion, round to clean numbers)
            - German buyers value certifications — emphasize ISO 27001, BSI C5, DSGVO
            - Replace "free trial" framing with "test phase" (Germans prefer formal terms)
            - Adjust testimonial to a European company/name
            Return the fully adapted version.
          prompt: |
            Culturally adapt for the DACH market:

            Translation: {state.translation}
            Original: {state.source_content}
          output: adaptation

        - id: legal_check
          type: llm_call
          depends_on: [cultural_adapt]
          system_prompt: >
            You are a German regulatory compliance specialist. Review for:
            - DSGVO (GDPR) compliance in all data processing claims
            - UWG (Unfair Competition Act) — no misleading price claims
            - TMG (Telemedia Act) requirements
            - Preisangabenverordnung — prices must include VAT note
            - Impressum requirements
            Flag issues and suggest required disclaimers.
            Respond with COMPLIANT: true/false and required changes.
          prompt: |
            Review for German legal compliance:

            {state.adaptation}
          output: legal_review

        - id: format_output
          type: llm_call
          depends_on: [legal_check]
          system_prompt: >
            Generate the final localized content package in structured format:
            LOCALE: de-DE
            HEADLINE: ...
            DESCRIPTION: ...
            CTA: ...
            LEGAL: ... (include VAT notice and required disclaimers)
            TESTIMONIAL: ...
            COMPLIANCE_NOTES: ...
          prompt: |
            Generate final German content package:

            Adapted content: {state.adaptation}
            Legal review: {state.legal_review}
          output: final_content
    output: localize_de

  - id: localize_ja
    type: subworkflow
    depends_on: [fetch_content]
    workflow_inline:
      name: localize-japanese
      config:
        provider: openai
        model: gpt-4.1-nano
      state:
        translation: ""
        adaptation: ""
        legal_review: ""
        final_content: ""
      steps:
        - id: translate
          type: llm_call
          system_prompt: >
            You are a professional EN→JA translator specializing in enterprise
            IT marketing. Use keigo (polite business Japanese). Balance katakana
            loanwords with native Japanese where appropriate. Technical terms
            should use industry-standard Japanese terminology.
          prompt: |
            Translate this marketing content to Japanese:

            {state.source_content}
          output: translation

        - id: cultural_adapt
          type: llm_call
          depends_on: [translate]
          system_prompt: >
            You are a Japanese market localization specialist. Adapt for Japanese
            enterprise audiences:
            - Replace US company references with Japanese equivalents (Nikkei 225)
            - Convert pricing to JPY (use current approximate rate, round to 10,000 yen)
            - Japanese enterprise buyers need trust signals — add references to
              Japan office, local support, data residency in Tokyo region
            - Adjust testimonial to a Japanese company name and title conventions
            - Emphasize reliability and long-term partnership over speed/disruption
            Return the fully adapted version.
          prompt: |
            Culturally adapt for the Japanese market:

            Translation: {state.translation}
            Original: {state.source_content}
          output: adaptation

        - id: legal_check
          type: llm_call
          depends_on: [cultural_adapt]
          system_prompt: >
            You are a Japanese regulatory compliance specialist. Review for:
            - APPI (Act on Protection of Personal Information) compliance
            - JFTC guidelines on premium offers and misleading representations
            - Specified Commercial Transactions Act requirements for pricing
            - Consumption tax (10%) disclosure requirements
            Flag issues and suggest required disclaimers.
            Respond with COMPLIANT: true/false and required changes.
          prompt: |
            Review for Japanese legal compliance:

            {state.adaptation}
          output: legal_review

        - id: format_output
          type: llm_call
          depends_on: [legal_check]
          system_prompt: >
            Generate the final localized content package in structured format:
            LOCALE: ja-JP
            HEADLINE: ...
            DESCRIPTION: ...
            CTA: ...
            LEGAL: ... (include consumption tax and required disclaimers)
            TESTIMONIAL: ...
            COMPLIANCE_NOTES: ...
          prompt: |
            Generate final Japanese content package:

            Adapted content: {state.adaptation}
            Legal review: {state.legal_review}
          output: final_content
    output: localize_ja

  # --- Layer 2: cross-market quality review ---

  - id: quality_review
    type: llm_call
    depends_on: [localize_es, localize_de, localize_ja]
    system_prompt: >
      You are a global content quality lead. Review all 3 localized versions
      for consistency:
      1. Brand voice consistency across markets
      2. Feature claims match across all versions
      3. No contradictory legal disclaimers
      4. CTA effectiveness in each locale
      5. Any cultural sensitivities missed

      Rate each locale: PASS / NEEDS_REVISION and explain any issues.
    prompt: |
      Cross-market quality review:

      Spanish (LATAM): {state.localize_es}
      German (DACH): {state.localize_de}
      Japanese: {state.localize_ja}
    output: quality_report

  # --- Layer 3: deployment manifest ---

  - id: generate_manifest
    type: llm_call
    depends_on: [quality_review]
    system_prompt: >
      Generate a CMS deployment manifest in structured format. For each locale,
      include: locale code, deployment status (ready/blocked), content hash
      placeholder, target URL path, and any blocking issues from quality review.
      Also include a rollout recommendation (simultaneous vs phased by market).
    prompt: |
      Generate deployment manifest:

      Quality report: {state.quality_report}
      Locales: es-419, de-DE, ja-JP
    output: deployment_manifest
