name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint & type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57  # v8
        with:
          enable-cache: true
      - run: uv sync --group dev
      - run: uv run ruff check src/ tests/
      - run: uv run ruff format --check src/ tests/
      - run: uv run mypy src/

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57  # v8
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}
      - run: uv sync --group dev --all-extras
      - run: uv run pytest --cov=agentloom --cov-report=xml --cov-report=term-missing
      - uses: codecov/codecov-action@18283e04ce6e62d37312384ff67231eb8fd56d24  # v5
        if: matrix.python-version == '3.12'
        with:
          files: coverage.xml
          fail_ci_if_error: ${{ github.event_name == 'push' }}
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  manifests:
    name: Validate K8s manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - name: Install tools
        run: |
          curl -sL "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.6.0/kustomize_v5.6.0_linux_amd64.tar.gz" | tar xz -C /usr/local/bin
          curl -sL "https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz" | tar xz -C /usr/local/bin
          curl -sL "https://get.helm.sh/helm-v3.16.4-linux-amd64.tar.gz" | tar xz --strip-components=1 -C /usr/local/bin linux-amd64/helm
      - name: Validate Kustomize overlays
        run: |
          for overlay in dev staging production; do
            echo "--- ${overlay} ---"
            kustomize build "deploy/k8s/overlays/${overlay}" | kubeconform -strict -summary
          done
      - name: Lint and validate Helm chart
        run: |
          helm lint deploy/helm/agentloom -f deploy/helm/agentloom/ci/test-values.yaml
          helm template test deploy/helm/agentloom -f deploy/helm/agentloom/ci/test-values.yaml -n agentloom | kubeconform -strict -summary
