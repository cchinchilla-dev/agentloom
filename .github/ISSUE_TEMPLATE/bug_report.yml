name: Bug Report
description: Report a bug in AgentLoom
labels: ["bug"]

body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the behavior
      placeholder: |
        1. Define workflow with...
        2. Run `agentloom run ...`
        3. See error...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: workflow
    attributes:
      label: Workflow YAML (if applicable)
      render: yaml

  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        - AgentLoom version: 0.1.0
        - Python: 3.12
        - OS: macOS 15 / Ubuntu 24.04
