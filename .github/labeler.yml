core:
  - changed-files:
      - any-glob-to-any-file:
          - src/agentloom/core/**

providers:
  - changed-files:
      - any-glob-to-any-file:
          - src/agentloom/providers/**

cli:
  - changed-files:
      - any-glob-to-any-file:
          - src/agentloom/cli/**

observability:
  - changed-files:
      - any-glob-to-any-file:
          - src/agentloom/observability/**

resilience:
  - changed-files:
      - any-glob-to-any-file:
          - src/agentloom/resilience/**

infrastructure:
  - changed-files:
      - any-glob-to-any-file:
          - deploy/**
          - Dockerfile
          - .dockerignore

ci:
  - changed-files:
      - any-glob-to-any-file:
          - .github/workflows/**

dependencies:
  - changed-files:
      - any-glob-to-any-file:
          - pyproject.toml
          - uv.lock

documentation:
  - changed-files:
      - any-glob-to-any-file:
          - docs/**
          - README.md
          - CHANGELOG.md
          - CONTRIBUTING.md
          - ATTRIBUTION.md

release:
  - head-branch: ['^release\/']
